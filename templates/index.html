<!DOCTYPE html>
<html lang="en" class="h-full bg-[#020617]">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AhantaPulse Freelance Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { background-color: #020617; }
    body { background-color: #020617; }
    .light-cone {
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      background: linear-gradient(to bottom, rgba(253, 224, 71, 0.32), rgba(253, 224, 71, 0));
    }
    /* Cord: no focus/tap stroke while pulling */
    #cord-root {
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
      outline: none !important;
      border: 0;
      box-shadow: none;
      background: transparent;
      padding: 0;
    }
    #cord-root:focus { outline: none !important; box-shadow: none !important; }
    #cord-root:focus-visible { outline: 2px solid rgba(56, 189, 248, 0.35); outline-offset: 4px; }
    #cord-line {
      width: 4px;
      margin-left: auto;
      margin-right: auto;
      border-radius: 9999px;
      background: linear-gradient(to bottom, #94a3b8, #cbd5e1);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
      transform-origin: top center;
    }
  </style>
</head>
<body id="page-root" class="min-h-full text-slate-100 antialiased overflow-x-hidden">

  <!-- Lit ambience (opacity only — avoids body bg swap flash) -->
  <div id="ambient" class="pointer-events-none fixed inset-0 z-0 bg-gradient-to-b from-slate-600/25 via-slate-900/40 to-[#020617] opacity-0 transition-opacity duration-500 ease-out" aria-hidden="true"></div>

  <div class="relative z-10 flex min-h-screen flex-col items-center justify-center px-4 pb-16 pt-8">

    <!-- Shown only when lamp is OFF -->
    <p id="hint-pull" class="show-when-dark mb-6 text-center text-sm tracking-wide text-slate-500 transition-opacity duration-300">
      Pull down
    </p>

    <!-- Shown when lamp is ON -->
    <header id="page-header" class="show-when-lit mb-8 max-w-lg text-center opacity-0 invisible transition-all duration-500 ease-out">
      <p class="mb-2 text-xs font-semibold uppercase tracking-[0.2em] text-sky-400/90">Ahanta</p>
      <h1 class="text-xl font-bold tracking-tight text-white sm:text-2xl">AhantaPulse Freelance Hub</h1>
      <p class="mt-2 text-sm text-slate-400">Get launch updates when freelancers and clients can join.</p>
    </header>

    <div class="flex w-full max-w-4xl flex-col items-center justify-center gap-10 md:flex-row md:items-start md:gap-14">

      <!-- Lamp (smaller) -->
      <div id="lamp-wrap" class="relative flex shrink-0 flex-col items-center">
        <div id="lamp-shade"
          class="relative z-20 flex h-24 w-32 flex-col items-center justify-center rounded-t-3xl bg-slate-800 shadow-xl ring-1 ring-white/5 transition-[background-color,box-shadow] duration-500 ease-out">
          <div class="mb-1.5 flex gap-6">
            <span class="h-1.5 w-1.5 animate-bounce rounded-full bg-slate-900"></span>
            <span class="h-1.5 w-1.5 animate-bounce rounded-full bg-slate-900" style="animation-delay:0.12s"></span>
          </div>
          <div id="lamp-mouth" class="h-2.5 w-5 rounded-full border-b-[3px] border-slate-900 transition-all duration-300"></div>
        </div>
        <div class="-mt-1 h-20 w-3 bg-slate-700 shadow-inner ring-1 ring-black/20"></div>
        <div class="-mt-1 h-3 w-16 rounded-full bg-slate-700 shadow-lg ring-1 ring-black/25"></div>

        <!-- Pull cord: hold & drag down -->
        <div id="cord-assembly" class="absolute left-7 top-[6.25rem] z-30 flex flex-col items-center" style="will-change: transform;">
          <div id="cord-line" class="h-14"></div>
          <button type="button" id="cord-root" aria-label="Pull cord to turn lamp on or off"
            class="relative flex flex-col items-center">
            <span id="cord-knob" class="block h-4 w-4 rounded-full bg-gradient-to-b from-slate-200 to-slate-400 shadow-md ring-1 ring-white/20"></span>
          </button>
        </div>

        <div id="light-beam"
          class="pointer-events-none absolute top-20 z-10 h-[min(55vh,420px)] w-[min(85vw,420px)] light-cone opacity-0 transition-opacity duration-500 ease-out">
        </div>
      </div>

      <!-- Get notified -->
      <div id="notify-card"
        class="show-when-lit relative z-30 w-full max-w-md rounded-2xl border border-slate-700/90 bg-slate-900/90 p-7 opacity-0 shadow-2xl backdrop-blur-md transition-all duration-700 ease-out invisible md:mt-0 translate-y-3 scale-[0.98] pointer-events-none">
        <h2 class="mb-1 text-lg font-bold text-white">Get notified</h2>
        <p class="mb-5 text-sm text-slate-400">We’ll email you when the hub opens.</p>
        <form id="notify-form" class="space-y-4">
          <div>
            <label for="notify-email" class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Email</label>
            <input id="notify-email" name="email" type="email" autocomplete="email" required
              class="w-full rounded-lg border border-slate-700 bg-[#020617] p-3 text-white outline-none transition-colors placeholder:text-slate-600 focus:border-sky-500"
              placeholder="you@example.com" />
          </div>
          <button type="submit"
            class="w-full rounded-lg bg-sky-600 py-3 font-bold text-white shadow-lg shadow-sky-900/25 transition hover:bg-sky-500 active:scale-[0.99]">
            Notify me
          </button>
        </form>
        <p id="notify-msg" class="mt-4 hidden text-center text-sm text-emerald-400" role="status"></p>
        <p id="notify-err" class="mt-2 hidden text-center text-sm text-red-400" role="alert"></p>
      </div>
    </div>
  </div>

  <noscript>
    <div class="fixed bottom-4 left-0 right-0 px-4 text-center text-sm text-slate-500">Enable JavaScript to use the lamp.</div>
  </noscript>

  <script>
(function () {
  var ambient = document.getElementById('ambient');
  var cordAsm = document.getElementById('cord-assembly');
  var cordBtn = document.getElementById('cord-root');
  var cordLine = document.getElementById('cord-line');
  var card = document.getElementById('notify-card');
  var header = document.getElementById('page-header');
  var hint = document.getElementById('hint-pull');
  var shade = document.getElementById('lamp-shade');
  var beam = document.getElementById('light-beam');
  var mouth = document.getElementById('lamp-mouth');
  var form = document.getElementById('notify-form');
  var msgOk = document.getElementById('notify-msg');
  var msgErr = document.getElementById('notify-err');

  var mouthOff = 'h-2.5 w-5 rounded-full border-b-[3px] border-slate-900 transition-all duration-300';
  var mouthOn = 'h-3 w-5 rounded-b-full bg-red-400 transition-all duration-300';

  var isLightOn = false;
  var dragging = false;
  var startY = 0;
  var maxPull = 64;
  var threshold = 28;
  var pullPx = 0;

  var elasticOut = 'transform 620ms cubic-bezier(0.34, 1.55, 0.42, 1.05)';

  function setUiLit(on) {
    isLightOn = on;
    if (on) {
      ambient.classList.remove('opacity-0');
      ambient.classList.add('opacity-100');
      shade.classList.replace('bg-slate-800', 'bg-yellow-300');
      shade.style.boxShadow = '0 0 36px rgba(253,224,71,0.5)';
      beam.classList.replace('opacity-0', 'opacity-100');
      mouth.className = mouthOn;

      hint.classList.add('opacity-0', 'pointer-events-none');
      window.setTimeout(function () { hint.classList.add('hidden'); }, 280);

      header.classList.remove('invisible', 'opacity-0');
      header.classList.add('opacity-100', 'visible');

      card.classList.remove('invisible', 'opacity-0', 'pointer-events-none', 'translate-y-3', 'scale-[0.98]');
      card.classList.add('opacity-100', 'visible', 'translate-y-0', 'scale-100');
    } else {
      beam.classList.replace('opacity-100', 'opacity-0');
      ambient.classList.remove('opacity-100');
      ambient.classList.add('opacity-0');

      window.setTimeout(function () {
        shade.classList.replace('bg-yellow-300', 'bg-slate-800');
        shade.style.boxShadow = '';
        mouth.className = mouthOff;
      }, 120);

      header.classList.add('invisible', 'opacity-0');
      header.classList.remove('visible', 'opacity-100');

      card.classList.add('invisible', 'opacity-0', 'pointer-events-none', 'translate-y-3', 'scale-[0.98]');
      card.classList.remove('visible', 'opacity-100', 'translate-y-0', 'scale-100');

      hint.classList.remove('hidden', 'opacity-0', 'pointer-events-none');

      msgOk.classList.add('hidden');
      msgErr.classList.add('hidden');
    }
  }

  function applyPullVisual(px) {
    pullPx = px;
    cordAsm.style.transition = 'none';
    var stretch = Math.min(px, maxPull);
    var extra = px > maxPull ? (px - maxPull) * 0.22 : 0;
    var y = stretch + extra;
    cordAsm.style.transform = 'translateY(' + y + 'px)';
    var baseH = 56;
    cordLine.style.height = baseH + Math.min(px, maxPull) * 0.35 + 'px';
  }

  function snapCordBack() {
    cordAsm.style.transition = elasticOut;
    cordLine.style.transition = 'height 620ms cubic-bezier(0.34, 1.55, 0.42, 1.05)';
    cordAsm.style.transform = 'translateY(0)';
    cordLine.style.height = '';
    window.setTimeout(function () {
      cordAsm.style.transition = '';
      cordLine.style.transition = '';
    }, 640);
  }

  cordBtn.addEventListener('pointerdown', function (e) {
    if (e.button !== undefined && e.button !== 0) return;
    dragging = true;
    startY = e.clientY;
    cordAsm.style.transition = 'none';
    cordLine.style.transition = 'none';
    try { cordBtn.setPointerCapture(e.pointerId); } catch (err) {}
    e.preventDefault();
  });

  function move(e) {
    if (!dragging) return;
    var dy = e.clientY - startY;
    if (dy < 0) dy = 0;
    applyPullVisual(dy);
  }

  function end(e) {
    if (!dragging) return;
    dragging = false;
    try { cordBtn.releasePointerCapture(e.pointerId); } catch (err2) {}
    var fired = pullPx >= threshold;
    pullPx = 0;
    if (fired) setUiLit(!isLightOn);
    snapCordBack();
  }

  window.addEventListener('pointermove', move, { passive: false });
  window.addEventListener('pointerup', end);
  window.addEventListener('pointercancel', end);

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    msgOk.classList.add('hidden');
    msgErr.classList.add('hidden');
    var email = (document.getElementById('notify-email').value || '').trim();
    fetch('/api/notify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
      body: JSON.stringify({ email: email })
    })
      .then(function (r) {
        return r.json().then(function (j) {
          return { ok: r.ok, body: j };
        });
      })
      .then(function (res) {
        if (res.ok && res.body.ok) {
          msgOk.textContent = res.body.message || "You're on the list.";
          msgOk.classList.remove('hidden');
          form.reset();
        } else {
          msgErr.textContent = res.body && res.body.error ? res.body.error : 'Something went wrong. Try again.';
          msgErr.classList.remove('hidden');
        }
      })
      .catch(function () {
        msgErr.textContent = 'Network error. Try again.';
        msgErr.classList.remove('hidden');
      });
  });
})();
  </script>
</body>
</html>
