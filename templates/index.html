<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AhantaPulse Freelance Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .light-cone {
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      background: linear-gradient(to bottom, rgba(253, 224, 71, 0.35), rgba(253, 224, 71, 0));
    }
    body.page-lit {
      background: linear-gradient(to bottom, rgb(30 41 59), rgb(15 23 42));
    }
    #pull-cord.pulling {
      transform: translateY(12px);
    }
  </style>
</head>
<body id="page-root" class="bg-slate-950 flex flex-col items-center justify-center min-h-screen overflow-x-hidden font-sans transition-colors duration-500">

  <header class="relative z-40 text-center px-4 mb-8 md:mb-10">
    <p class="text-sky-400 text-xs font-semibold uppercase tracking-widest mb-2">Ahanta</p>
    <h1 class="text-2xl md:text-3xl font-bold text-white tracking-tight">AhantaPulse Freelance Hub</h1>
    <p class="text-slate-500 text-sm mt-2 max-w-md mx-auto">Pull the lamp cord to light the room and get launch updates.</p>
  </header>

  <div class="relative flex flex-col md:flex-row items-center justify-center w-full max-w-4xl gap-12 md:gap-20 px-4 pb-12">

    <!-- Lamp -->
    <div class="relative flex flex-col items-center shrink-0">
      <div id="lamp-shade" class="relative z-20 w-48 h-36 bg-slate-800 rounded-t-3xl transition-all duration-500 flex flex-col items-center justify-center shadow-2xl">
        <div class="flex gap-8 mb-2">
          <div class="w-2 h-2 bg-slate-900 rounded-full animate-bounce"></div>
          <div class="w-2 h-2 bg-slate-900 rounded-full animate-bounce" style="animation-delay:0.15s"></div>
        </div>
        <div id="lamp-mouth" class="w-6 h-3 border-b-4 border-slate-900 rounded-full transition-all duration-300"></div>
      </div>
      <div class="w-4 h-32 bg-slate-700 -mt-2 shadow-inner"></div>
      <div class="w-24 h-4 bg-slate-700 rounded-full -mt-1 shadow-lg"></div>

      <button type="button" id="pull-cord" aria-label="Pull cord to toggle lamp"
        class="absolute top-36 left-12 w-1 bg-slate-400 h-24 cursor-pointer transition-all duration-150 rounded-full focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-offset-2 focus:ring-offset-slate-950">
        <span class="absolute -bottom-2 -left-2 w-5 h-5 bg-slate-300 rounded-full shadow-md hover:scale-110 transition-transform pointer-events-none"></span>
      </button>

      <div id="light-beam" class="absolute top-32 w-[min(90vw,600px)] h-[500px] light-cone opacity-0 transition-opacity duration-500 pointer-events-none z-10"></div>
    </div>

    <!-- Get notified (hidden until lamp on) -->
    <div id="notify-card"
      class="relative z-30 w-full max-w-md p-8 bg-slate-900/85 backdrop-blur-md border border-slate-700 rounded-2xl shadow-2xl opacity-0 translate-x-8 scale-95 transition-all duration-700 pointer-events-none">
      <h2 class="text-xl font-bold text-white mb-1">Get notified</h2>
      <p class="text-slate-400 text-sm mb-6">Leave your email and we’ll ping you when freelancers and clients can join.</p>

      <form id="notify-form" class="space-y-4">
        <div>
          <label for="notify-email" class="block text-xs font-semibold text-slate-500 uppercase mb-1">Email</label>
          <input id="notify-email" name="email" type="email" autocomplete="email" required
            class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white outline-none focus:border-sky-500 transition-colors placeholder:text-slate-600"
            placeholder="you@example.com" />
        </div>
        <button type="submit"
          class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-lg mt-1 transform active:scale-[0.98] transition-all shadow-lg shadow-sky-900/30">
          Notify me
        </button>
      </form>
      <p id="notify-msg" class="hidden text-center text-sm mt-4 text-emerald-400" role="status"></p>
      <p id="notify-err" class="hidden text-center text-sm mt-2 text-red-400" role="alert"></p>
    </div>
  </div>

  <noscript>
    <div class="fixed bottom-4 left-0 right-0 text-center text-slate-500 text-sm px-4">
      Enable JavaScript to use the lamp and subscribe for updates.
    </div>
  </noscript>

  <script>
(function () {
  var root = document.getElementById('page-root');
  var cord = document.getElementById('pull-cord');
  var card = document.getElementById('notify-card');
  var shade = document.getElementById('lamp-shade');
  var beam = document.getElementById('light-beam');
  var mouth = document.getElementById('lamp-mouth');
  var form = document.getElementById('notify-form');
  var msgOk = document.getElementById('notify-msg');
  var msgErr = document.getElementById('notify-err');

  var mouthOff = 'w-6 h-3 border-b-4 border-slate-900 rounded-full transition-all duration-300';
  var mouthOn = 'w-6 h-4 bg-red-400 rounded-b-full transition-all duration-300';
  var isLightOn = false;

  function setLit(on) {
    isLightOn = on;
    if (on) {
      root.classList.add('page-lit');
      shade.classList.replace('bg-slate-800', 'bg-yellow-300');
      shade.style.boxShadow = '0 0 50px rgba(253,224,71,0.55)';
      beam.classList.replace('opacity-0', 'opacity-100');
      mouth.className = mouthOn;
      card.classList.remove('opacity-0', 'translate-x-8', 'scale-95', 'pointer-events-none');
    } else {
      root.classList.remove('page-lit');
      shade.classList.replace('bg-yellow-300', 'bg-slate-800');
      shade.style.boxShadow = '';
      beam.classList.replace('opacity-100', 'opacity-0');
      mouth.className = mouthOff;
      card.classList.add('opacity-0', 'translate-x-8', 'scale-95', 'pointer-events-none');
      msgOk.classList.add('hidden');
      msgErr.classList.add('hidden');
    }
  }

  cord.addEventListener('click', function () {
    cord.classList.add('pulling');
    window.setTimeout(function () { cord.classList.remove('pulling'); }, 220);
    setLit(!isLightOn);
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    msgOk.classList.add('hidden');
    msgErr.classList.add('hidden');
    var email = (document.getElementById('notify-email').value || '').trim();
    fetch('/api/notify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ email: email })
    })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); })
      .then(function (res) {
        if (res.ok && res.body.ok) {
          msgOk.textContent = res.body.message || "You're on the list.";
          msgOk.classList.remove('hidden');
          form.reset();
        } else {
          msgErr.textContent = (res.body && res.body.error) ? res.body.error : 'Something went wrong. Try again.';
          msgErr.classList.remove('hidden');
        }
      })
      .catch(function () {
        msgErr.textContent = 'Network error. Try again.';
        msgErr.classList.remove('hidden');
      });
  });
})();
  </script>
</body>
</html>
