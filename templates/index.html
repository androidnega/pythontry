<!DOCTYPE html>
<html lang="en" class="h-full bg-[#020617]">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AhantaPulse Freelance Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { background-color: #020617; }
    body { background-color: #020617; }
    .light-cone {
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      transform-origin: 50% 0%;
    }
    /* Beam: always default — straight down from shade (all breakpoints when lit) */
    #light-beam {
      left: 50%;
      top: 4.5rem;
      width: min(88vw, 400px);
      height: min(50vh, 380px);
      transform: translateX(-50%);
      transition: opacity 0.5s ease;
      background: linear-gradient(to bottom, rgba(253, 224, 71, 0.32), rgba(253, 224, 71, 0));
    }
    /* Lamp off: solo lamp perfectly centered (H + V) in viewport */
    body:not(.lamp-lit) #main-stage {
      display: grid !important;
      place-items: center;
      min-height: 100dvh;
      width: 100%;
      padding: 0 !important;
      margin: 0;
    }
    body:not(.lamp-lit) #scene-row {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 0;
    }
    @keyframes lamp-blink {
      0%, 41%, 49%, 100% { transform: scaleY(1); opacity: 1; }
      45%, 47% { transform: scaleY(0.12); opacity: 0.85; }
    }
    .lamp-eye {
      transform-origin: center;
      animation: lamp-blink 3.2s ease-in-out infinite;
      box-shadow: 0 0 0 1px rgba(15,23,42,0.35);
      transition: background-color 0.35s ease, box-shadow 0.35s ease;
    }
    body.lamp-lit .lamp-eye {
      background-color: #0f172a !important;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.28) !important;
    }
    .lamp-eye-delay { animation-delay: 0.14s; }
    /* Idle “how to pull” motion — gentle dangle (paused while dragging / when lit) */
    @keyframes cord-dangle {
      0%, 100% { transform: translateY(0) rotate(-1.5deg); }
      35% { transform: translateY(10px) rotate(1.5deg); }
      65% { transform: translateY(4px) rotate(-1deg); }
    }
    .cord-idle {
      animation: cord-dangle 2.4s ease-in-out infinite;
      transform-origin: top center;
    }
    .cord-idle.paused {
      animation: none;
    }
    /* Idle mouth — gentle smile wiggle */
    @keyframes mouth-idle {
      0%, 100% { transform: translateY(0) scaleX(1); }
      45% { transform: translateY(1px) scaleX(1.06); }
      55% { transform: translateY(0) scaleX(1); }
    }
    #lamp-mouth.mouth-idle {
      transform-origin: center;
      animation: mouth-idle 3s ease-in-out infinite;
    }
    #lamp-mouth.paused {
      animation: none !important;
    }
    .notify-icon svg {
      opacity: 0.92;
    }
    #cord-root {
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
      outline: none !important;
      border: 0;
      box-shadow: none;
      background: transparent;
      padding: 0;
    }
    #cord-root:focus { outline: none !important; box-shadow: none !important; }
    #cord-root:focus-visible { outline: 2px solid rgba(56, 189, 248, 0.35); outline-offset: 4px; }
    #cord-line {
      width: 4px;
      margin-left: auto;
      margin-right: auto;
      border-radius: 9999px;
      background: linear-gradient(to bottom, #94a3b8, #cbd5e1);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
      flex-shrink: 0;
    }
    body.lamp-lit #main-stage {
      display: flex !important;
      flex-direction: column;
      padding-top: 11rem;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      width: 100%;
    }
    @media (min-width: 768px) {
      body.lamp-lit #main-stage {
        padding-top: 12rem;
      }
    }
  </style>
</head>
<body id="page-root" class="min-h-full text-slate-100 antialiased overflow-x-hidden">

  <div id="ambient" class="pointer-events-none fixed inset-0 z-0 bg-gradient-to-b from-slate-600/25 via-slate-900/40 to-[#020617] opacity-0 transition-opacity duration-500 ease-out" aria-hidden="true"></div>

  <!-- Title only when lamp is on — pushed well below top -->
  <header id="page-header"
    class="fixed inset-x-0 top-14 z-50 border-b border-transparent bg-[#020617]/92 px-4 pb-3 pt-2 text-center backdrop-blur-[6px] transition-all duration-500 ease-out invisible opacity-0 md:top-20 md:pb-3.5 md:pt-2.5">
    <p class="mb-0.5 text-[10px] font-semibold uppercase tracking-[0.22em] text-sky-400/90">Ahanta</p>
    <h1 class="text-lg font-bold tracking-tight text-white sm:text-xl md:text-2xl">AhantaPulse Freelance Hub</h1>
    <p class="mx-auto mt-0.5 max-w-md text-xs text-slate-400 md:text-sm">Get launch updates when freelancers and clients can join.</p>
  </header>

  <!-- Lamp solo = perfect center; lit = row shifts lamp + shows form -->
  <div id="main-stage" class="flex min-h-screen w-full flex-col items-center justify-center px-4 pb-12 pt-8 transition-[padding] duration-500">

    <div id="scene-row"
      class="flex w-full max-w-5xl flex-col items-center justify-center gap-10 transition-[justify-content,gap] duration-700 ease-out md:flex-row md:items-stretch md:justify-center md:gap-12">

      <div id="lamp-wrap" class="relative flex shrink-0 flex-col items-center pb-24 transition-transform duration-700 ease-out md:h-full md:min-h-0">
        <!-- Lamp body (shade → pole → base) -->
        <div id="lamp-body" class="relative flex flex-col items-center">
          <div id="lamp-shade"
            class="relative z-20 flex h-24 w-32 flex-col items-center justify-center rounded-t-3xl bg-slate-800 shadow-xl ring-1 ring-white/5 transition-[background-color,box-shadow] duration-500 ease-out">
            <div class="mb-1.5 flex gap-6">
              <span class="lamp-eye h-2 w-2 rounded-full bg-white"></span>
              <span class="lamp-eye lamp-eye-delay h-2 w-2 rounded-full bg-white"></span>
            </div>
            <div id="lamp-mouth" class="mouth-idle h-2.5 w-5 rounded-full border-b-[3px] border-slate-900 transition-all duration-300"></div>
          </div>
          <div class="-mt-1 h-20 w-3 bg-slate-700 shadow-inner ring-1 ring-black/20"></div>
          <div class="-mt-1 h-3 w-16 rounded-full bg-slate-700 shadow-lg ring-1 ring-black/25"></div>

          <div id="light-beam"
            class="light-cone pointer-events-none absolute z-10 opacity-0 transition-opacity duration-500 ease-out">
          </div>
        </div>

        <!-- Cord: original side hang + same idle sway (top anchor = shade; line stretches on pull) -->
        <div id="cord-dangle-wrap" class="cord-idle absolute left-7 top-[6.25rem] z-30 flex flex-col items-center"
          style="transform-origin: top center;">
          <div id="cord-line" class="h-14"></div>
          <button type="button" id="cord-root" aria-label="Pull cord to turn lamp on or off"
            class="relative mt-0 flex flex-col items-center">
            <span id="cord-knob" class="block h-4 w-4 rounded-full bg-gradient-to-b from-slate-200 to-slate-400 shadow-md ring-1 ring-white/20"></span>
          </button>
        </div>
      </div>

      <div id="notify-card"
        class="relative z-30 hidden w-full max-w-[16.5rem] rounded-lg border border-slate-800/90 bg-slate-950/85 p-3 opacity-0 transition-all duration-700 ease-out invisible pointer-events-none translate-y-3 scale-[0.98] md:mt-0 md:flex md:h-full md:min-h-0 md:max-w-[17rem] md:flex-col md:justify-between md:self-stretch">
        <div class="notify-card-top flex gap-2.5">
          <span class="notify-icon mt-0.5 flex h-8 w-8 shrink-0 items-center justify-center rounded-md border border-slate-800 bg-[#020617] text-sky-400/85" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <path d="m22 6-10 7L2 6" />
            </svg>
          </span>
          <div class="min-w-0 flex-1">
            <h2 class="text-sm font-semibold leading-tight tracking-tight text-white">Get notified</h2>
            <p class="mt-0.5 text-[11px] leading-snug text-slate-500">Launch updates only.</p>
          </div>
        </div>
        <div class="notify-card-bottom mt-2.5 md:mt-0">
          <form id="notify-form" class="space-y-2">
            <div>
              <label for="notify-email" class="sr-only">Email</label>
              <input id="notify-email" name="email" type="email" autocomplete="email" required
                class="w-full rounded-md border border-slate-800 bg-[#020617] px-2.5 py-1.5 text-xs text-white outline-none transition-colors placeholder:text-slate-600 focus:border-slate-600 focus:ring-1 focus:ring-sky-500/35"
                placeholder="Email" />
            </div>
            <button type="submit"
              class="w-full rounded-md bg-sky-600 py-1.5 text-xs font-medium text-white transition hover:bg-sky-500 active:bg-sky-600">
              Notify me
            </button>
          </form>
          <p id="notify-msg" class="mt-2 hidden text-center text-[11px] text-emerald-400/90" role="status"></p>
          <p id="notify-err" class="mt-1.5 hidden text-center text-[11px] text-red-400/90" role="alert"></p>
        </div>
      </div>
    </div>
  </div>

  <noscript>
    <div class="fixed bottom-4 left-0 right-0 px-4 text-center text-sm text-slate-500">Enable JavaScript to use the lamp.</div>
  </noscript>

  <script>
(function () {
  var ambient = document.getElementById('ambient');
  var cordLine = document.getElementById('cord-line');
  var cordBtn = document.getElementById('cord-root');
  var cordDangle = document.getElementById('cord-dangle-wrap');
  var card = document.getElementById('notify-card');
  var header = document.getElementById('page-header');
  var root = document.getElementById('page-root');
  var shade = document.getElementById('lamp-shade');
  var beam = document.getElementById('light-beam');
  var mouth = document.getElementById('lamp-mouth');
  var form = document.getElementById('notify-form');
  var msgOk = document.getElementById('notify-msg');
  var msgErr = document.getElementById('notify-err');

  var mouthOff = 'mouth-idle h-2.5 w-5 rounded-full border-b-[3px] border-slate-900 transition-all duration-300';
  var mouthOn = 'h-3 w-5 rounded-b-full bg-red-400 transition-all duration-300';

  var isLightOn = false;
  var dragging = false;
  var startY = 0;
  var maxPull = 64;
  var threshold = 28;
  var pullPx = 0;
  var BASE_H = 56;

  var elasticHeight = 'height 620ms cubic-bezier(0.34, 1.55, 0.42, 1.05)';

  /** animate = show idle “pull” sway (only when lamp is off). */
  function setCordMotion(animate) {
    if (!cordDangle) return;
    if (animate) {
      cordDangle.classList.remove('paused');
    } else {
      cordDangle.classList.add('paused');
    }
  }

  function setMouthMotion(animate) {
    if (!mouth) return;
    if (animate) {
      mouth.classList.remove('paused');
    } else {
      mouth.classList.add('paused');
    }
  }

  function setUiLit(on) {
    isLightOn = on;
    if (on) {
      root.classList.add('lamp-lit');
      ambient.classList.remove('opacity-0');
      ambient.classList.add('opacity-100');
      shade.classList.replace('bg-slate-800', 'bg-yellow-300');
      shade.style.boxShadow = '0 0 36px rgba(253,224,71,0.5)';
      beam.classList.replace('opacity-0', 'opacity-100');
      mouth.className = mouthOn;
      setMouthMotion(false);

      header.classList.remove('invisible', 'opacity-0');
      header.classList.add('opacity-100', 'visible');
      header.classList.remove('border-transparent');
      header.classList.add('border-slate-800/50');

      setCordMotion(false);

      card.classList.remove('hidden');
      window.requestAnimationFrame(function () {
        card.classList.remove('invisible', 'opacity-0', 'translate-y-3', 'scale-[0.98]', 'pointer-events-none');
        card.classList.add('opacity-100', 'visible', 'translate-y-0', 'scale-100');
      });
    } else {
      root.classList.remove('lamp-lit');
      beam.classList.replace('opacity-100', 'opacity-0');
      ambient.classList.remove('opacity-100');
      ambient.classList.add('opacity-0');

      window.setTimeout(function () {
        shade.classList.replace('bg-yellow-300', 'bg-slate-800');
        shade.style.boxShadow = '';
        mouth.className = mouthOff;
        setMouthMotion(true);
      }, 120);

      header.classList.add('invisible', 'opacity-0');
      header.classList.remove('visible', 'opacity-100');
      header.classList.add('border-transparent');
      header.classList.remove('border-slate-800/50');

      card.classList.add('pointer-events-none', 'invisible', 'opacity-0', 'translate-y-3', 'scale-[0.98]');
      card.classList.remove('visible', 'opacity-100', 'translate-y-0', 'scale-100');

      window.setTimeout(function () {
        card.classList.add('hidden');
      }, 520);

      setCordMotion(true);

      msgOk.classList.add('hidden');
      msgErr.classList.add('hidden');
    }
  }

  function applyPullVisual(px) {
    pullPx = px;
    cordLine.style.transition = 'none';
    var stretch = Math.min(px, maxPull);
    var extra = px > maxPull ? (px - maxPull) * 0.22 : 0;
    cordLine.style.height = BASE_H + stretch + extra + 'px';
  }

  function snapCordBack() {
    cordLine.style.transition = elasticHeight;
    cordLine.style.height = '';
    window.setTimeout(function () {
      cordLine.style.transition = '';
    }, 640);
  }

  cordBtn.addEventListener('pointerdown', function (e) {
    if (e.button !== undefined && e.button !== 0) return;
    dragging = true;
    startY = e.clientY;
    cordLine.style.transition = 'none';
    setCordMotion(false);
    setMouthMotion(false);
    try {
      cordBtn.setPointerCapture(e.pointerId);
    } catch (err) {}
    e.preventDefault();
  });

  function move(e) {
    if (!dragging) return;
    var dy = e.clientY - startY;
    if (dy < 0) dy = 0;
    applyPullVisual(dy);
  }

  function end(e) {
    if (!dragging) return;
    dragging = false;
    try {
      cordBtn.releasePointerCapture(e.pointerId);
    } catch (err2) {}
    var fired = pullPx >= threshold;
    var wasOn = isLightOn;
    pullPx = 0;
    if (fired) {
      setUiLit(!wasOn);
    } else {
      if (wasOn) {
        setCordMotion(false);
        setMouthMotion(false);
      } else {
        setCordMotion(true);
        setMouthMotion(true);
      }
    }
    snapCordBack();
  }

  window.addEventListener('pointermove', move, { passive: false });
  window.addEventListener('pointerup', end);
  window.addEventListener('pointercancel', end);

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    msgOk.classList.add('hidden');
    msgErr.classList.add('hidden');
    var email = (document.getElementById('notify-email').value || '').trim();
    fetch('/api/notify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
      body: JSON.stringify({ email: email })
    })
      .then(function (r) {
        return r.json().then(function (j) {
          return { ok: r.ok, body: j };
        });
      })
      .then(function (res) {
        if (res.ok && res.body.ok) {
          msgOk.textContent = res.body.message || "You're on the list.";
          msgOk.classList.remove('hidden');
          form.reset();
        } else {
          msgErr.textContent = res.body && res.body.error ? res.body.error : 'Something went wrong. Try again.';
          msgErr.classList.remove('hidden');
        }
      })
      .catch(function () {
        msgErr.textContent = 'Network error. Try again.';
        msgErr.classList.remove('hidden');
      });
  });
})();
  </script>
</body>
</html>
